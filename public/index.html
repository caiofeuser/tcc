<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TCC Assistant Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1d1d1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f7f4;
      color: #1d1d1b;
    }

    main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
    }

    .status {
      min-width: 120px;
      text-align: right;
      font-size: 13px;
      color: #5f615a;
    }

    .panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 16px;
      border: 1px solid #d8d9d2;
      border-radius: 8px;
      background: #ffffff;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #4d4f48;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #caccbf;
      border-radius: 6px;
      padding: 10px 12px;
      background: #fbfbf8;
      color: #1d1d1b;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid #22251f;
      border-radius: 6px;
      padding: 9px 12px;
      background: #22251f;
      color: #ffffff;
      cursor: pointer;
    }

    button.secondary {
      background: #ffffff;
      color: #22251f;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    pre {
      min-height: 260px;
      margin: 0;
      padding: 14px;
      overflow: auto;
      border: 1px solid #d8d9d2;
      border-radius: 8px;
      background: #11130f;
      color: #f0f0e8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>TCC Assistant Test</h1>
      <div class="status" id="status">Idle</div>
    </header>

    <section class="panel">
      <label>
        Session
        <input id="session" autocomplete="off" />
      </label>

      <label>
        Message
        <textarea id="message">How do I move the Epson robot arm to a coordinate?</textarea>
      </label>

      <div class="actions">
        <button id="ask">Ask AI</button>
        <button class="secondary" id="rag">Search RAG</button>
        <button class="secondary" id="health">Health</button>
        <button class="secondary" id="clear">Clear</button>
      </div>

      <pre id="output"></pre>
    </section>
  </main>

  <script>
    const statusEl = document.querySelector("#status");
    const outputEl = document.querySelector("#output");
    const messageEl = document.querySelector("#message");
    const sessionEl = document.querySelector("#session");
    const buttons = Array.from(document.querySelectorAll("button"));

    const storedSession = localStorage.getItem("tcc-session-id");
    const sessionId =
      storedSession ||
      ((sessionEl.value = crypto.randomUUID()), sessionEl.value);

    sessionEl.value = sessionId;
    localStorage.setItem("tcc-session-id", sessionId);

    function setBusy(isBusy, label = "Idle") {
      statusEl.textContent = label;
      for (const button of buttons) button.disabled = isBusy;
    }

    function write(value) {
      outputEl.textContent = value;
    }

    function append(value) {
      outputEl.textContent += value;
    }

    async function readJson(response) {
      const text = await response.text();
      try {
        return JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        return text;
      }
    }

    document.querySelector("#health").addEventListener("click", async () => {
      setBusy(true, "Checking");
      try {
        const response = await fetch("/health");
        write(await readJson(response));
      } catch (error) {
        write(String(error));
      } finally {
        setBusy(false);
      }
    });

    document.querySelector("#rag").addEventListener("click", async () => {
      setBusy(true, "Searching");
      try {
        const response = await fetch("/api/rag/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: messageEl.value }),
        });
        write(await readJson(response));
      } catch (error) {
        write(String(error));
      } finally {
        setBusy(false);
      }
    });

    document.querySelector("#ask").addEventListener("click", async () => {
      setBusy(true, "Streaming");
      write("");

      try {
        const response = await fetch("/api/ai/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session: sessionEl.value,
            message: messageEl.value,
          }),
        });

        if (!response.ok || !response.body) {
          write(await response.text());
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          append(decoder.decode(value, { stream: true }));
        }
      } catch (error) {
        write(String(error));
      } finally {
        setBusy(false);
      }
    });

    document.querySelector("#clear").addEventListener("click", () => {
      write("");
    });
  </script>
</body>

</html>
